
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FitWolf | Daily Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #030303;
            --color-accent: #FF2A2A;
            --color-armory: #00F0FF;
            --color-guild: #00FF88;
        }

        /* Hide Google Translate Toolbar */
        .goog-te-banner-frame.skiptranslate, .goog-te-banner-frame { display: none !important; }
        .skiptranslate > iframe { display: none !important; }
        iframe.skiptranslate { display: none !important; }
        body { top: 0px !important; margin-top: 0px !important; }
        html { margin-top: 0px !important; }
        #goog-gt-tt { display: none !important; }
        .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }
        .VIpgJd-ZVi9od-ORHb-OEVmcd { display: none !important; }
        .VIpgJd-ZVi9od-aZ2wEe-wOHMyf { display: none !important; }
        
        /* Style Google Translate Widget */
        .goog-te-gadget { color: transparent !important; width: 100%; height: 100%; }
        .goog-te-gadget .goog-te-combo {
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
        }
        .goog-te-gadget .goog-te-combo:focus { border-color: #FF2A2A; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--color-primary);
            color: #ffffff;
            scrollbar-width: thin;
            scrollbar-color: var(--color-accent) var(--color-primary);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Mobile Safe Area Fixes */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .brushed-metal {
            background: linear-gradient(135deg, #1a1a1a 0%, #111111 50%, #0a0a0a 100%);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);
        }

        .pulse-accent {
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0px rgba(255, 42, 42, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 42, 42, 0); }
            100% { box-shadow: 0 0 0 0px rgba(255, 42, 42, 0); }
        }

        .glitch-wrapper { display: flex; align-items: center; justify-content: flex-start; text-align: left; }
        .glitch { position: relative; display: inline-block; }
        .glitch::before, .glitch::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; }
        .glitch::before { left: 1px; text-shadow: -1px 0 var(--color-accent); clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%); animation: glitch-anim-2 20s infinite linear alternate-reverse; opacity: 0.15; }
        .glitch::after { left: -1px; text-shadow: -1px 0 #00ffff, 1px 1px var(--color-accent); clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%); animation: glitch-anim-1 25s infinite linear alternate-reverse; opacity: 0.15; }

        @keyframes glitch-anim-1 { 0% { clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%); transform: translate(0); } 1% { clip-path: polygon(0 70%, 100% 70%, 100% 100%, 0 100%); transform: translate(-1px, 0); } 2% { clip-path: polygon(0 40%, 100% 40%, 100% 100%, 0 100%); transform: translate(1px, 0); } 3%, 100% { clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%); transform: translate(0); } }
        @keyframes glitch-anim-2 { 0% { clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%); transform: translate(0); } 1.5% { clip-path: polygon(0 0, 100% 0, 100% 20%, 0 20%); transform: translate(1px, 0); } 3% { clip-path: polygon(0 0, 100% 0, 100% 60%, 0 60%); transform: translate(-1px, 0); } 4.5%, 100% { clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%); transform: translate(0); } }

        .data-font { font-family: 'Roboto Mono', monospace; }
        
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
          display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="google_translate_element" style="display:none;"></div>
    <div id="root"></div>
<script type="text/javascript">
function googleTranslateElementInit() {
  new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'en,nl,de,fr,es', autoDisplay: false}, 'google_translate_element');
}
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
